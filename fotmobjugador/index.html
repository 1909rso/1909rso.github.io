<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrusel de jugador — estilo FotMob</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --bg:#141414;
    --panel:#1d1d1d;
    --panel-2:#1c1c1c;
    --line:#2a2a2a;
    --white:#ffffff;
    --sub:#8a8a8a;
    --sub-2:#5c5c5c;
    --green:#0067b1;
    --orange:#ff9f2e;
    --red:#ff4d4d;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:#0a0a0a;
    font-family:'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    color:var(--white);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 16px 60px;
    min-height:100vh;
  }
  h1.page-title{
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--sub);
    margin-bottom:20px;
    font-weight:600;
  }

  /* ---------- LOADER PANEL ---------- */
  .loader-panel{
    width:400px;
    max-width:92vw;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px 20px;
    margin-bottom:26px;
  }
  .loader-title{
    font-size:13px;
    font-weight:800;
    letter-spacing:.5px;
    text-transform:uppercase;
    color:var(--green);
    margin-bottom:4px;
  }
  .loader-sub{ font-size:11px; color:var(--sub); margin-bottom:12px; line-height:1.4; }
  .loader-input, .loader-textarea{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--white);
    font-size:12px;
    padding:10px 12px;
    font-family:inherit;
    margin-bottom:10px;
    resize:vertical;
  }
  .loader-textarea{ min-height:90px; }
  .loader-input:focus, .loader-textarea:focus{ outline:none; border-color:var(--green); }
  .loader-actions{ display:flex; gap:10px; flex-wrap:wrap; }
  .loader-status{ margin-top:10px; font-size:11px; color:var(--sub); min-height:14px; }

  .photo-upload-row{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .photo-upload-label{
    background:var(--panel-2); border:1px solid var(--line); color:var(--white);
    font-size:11px; padding:9px 12px; border-radius:8px; cursor:pointer; font-family:inherit;
  }
  .photo-upload-label:hover{ border-color:var(--green); }

  .export-btn{
    background:var(--green);
    color:#0a0a0a;
    border:none;
    padding:12px 22px;
    border-radius:10px;
    font-weight:800;
    font-size:13px;
    letter-spacing:.5px;
    cursor:pointer;
    text-transform:uppercase;
    font-family:inherit;
  }
  .export-btn.secondary{ background:transparent; color:var(--white); border:1px solid var(--line); }
  .export-btn:hover{ filter:brightness(1.1); }

  /* ---------- STAGE / SLIDES ---------- */
  /* Base design is 400x500 (4:5 ratio). Exported at scale 5 -> 2000x2500px exactly. */
  .stage{ width:400px; max-width:92vw; }
  .track{ position:relative; border-radius:14px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.6); }
  .slide{
    width:400px;
    aspect-ratio: 4 / 5;
    background:var(--bg);
    position:relative;
    display:flex;
    flex-direction:column;
    padding:22px 22px 20px;
  }
  .top-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px;
  }
  .wordmark{ font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--sub); font-weight:700; }
  .slide-tag{
    font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--sub-2);
    border:1px solid var(--line); padding:3px 9px; border-radius:999px;
  }

  /* SLIDE 1: perfil + posicion fusionados */
  .head-row{ display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .headshot-sm{
    width:76px; height:76px; border-radius:14px; overflow:hidden; flex-shrink:0;
    background:var(--panel);
  }
  .headshot-sm img{ width:100%; height:100%; object-fit:cover; object-position:top center; }
  .head-text{ display:flex; flex-direction:column; gap:3px; min-width:0; }
  .p-name{ font-size:20px; font-weight:800; letter-spacing:-.3px; line-height:1.15; }
  .p-team{ font-size:12px; color:var(--sub); }

  .info-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:1px;
    background:var(--line); border:1px solid var(--line); border-radius:10px; overflow:hidden;
    margin-bottom:14px;
  }
  .info-cell{ background:var(--panel); padding:9px 14px; }
  .info-cell.full{ grid-column:1 / -1; }
  .info-cell .lbl{ font-size:9px; color:var(--sub-2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
  .info-cell .val{ font-size:15px; font-weight:700; }

  /* Tarjeta de posición: texto a la izquierda + campo estrecho a la derecha */
  .pos-card{
    margin-top:auto;
    display:flex; align-items:flex-start; justify-content:space-between; gap:14px;
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px;
  }
  .pos-text{ display:flex; flex-direction:column; min-width:0; }
  .pos-title{ font-size:14px; font-weight:800; color:var(--white); margin-bottom:12px; }
  .pos-sub-label{ font-size:9px; color:var(--sub-2); text-transform:uppercase; letter-spacing:.6px; margin-bottom:5px; }
  .pos-primary-name{ font-size:14px; font-weight:700; color:var(--white); text-transform:capitalize; }
  .pos-pitch-wrap{ width:96px; flex-shrink:0; }
  .pitch-svg-narrow{ width:100%; height:auto; display:block; }

  /* SLIDE 2: hexagono */
  .sec-title{ font-size:19px; font-weight:800; margin-bottom:2px; }
  .sec-sub{ font-size:11px; color:var(--sub); margin-bottom:16px; }
  .hex-wrap{ flex:1; display:flex; align-items:center; justify-content:center; }
  .hex-svg{ width:100%; height:auto; }

  /* SLIDE 3: temporada */
  .league-row{ display:flex; align-items:center; gap:8px; margin-bottom:18px; }
  .league-dot{ width:8px; height:8px; border-radius:50%; background:var(--green); }
  .league-name{ font-size:13px; font-weight:700; }
  .stat-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--line); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .stat-cell{ background:var(--panel); padding:16px 10px; text-align:center; }
  .stat-cell .num{ font-size:26px; font-weight:800; }
  .stat-cell .lbl{ font-size:9px; color:var(--sub-2); text-transform:uppercase; letter-spacing:.4px; margin-top:6px; }
  .rating-badge{ color:var(--green); }
  .footer-mini{ margin-top:auto; font-size:9px; color:var(--sub-2); text-align:center; letter-spacing:.4px; }

  /* ---------- CONTROLS ---------- */
  .controls{ display:flex; justify-content:center; align-items:center; gap:18px; margin-top:22px; }
  .nav-btn{
    background:var(--panel-2); border:1px solid var(--line); color:var(--white);
    width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; font-family:inherit;
  }
  .nav-btn:hover{ border-color:var(--green); color:var(--green); }
  .dots{ display:flex; gap:6px; }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--line); transition:.2s; }
  .dot.active{ background:var(--green); width:18px; border-radius:4px; }
  .export-row{ display:flex; gap:12px; margin-top:26px; }
  .status{ margin-top:12px; font-size:12px; color:var(--sub); height:16px; }
</style>
</head>
<body>

<h1 class="page-title">Perfil de jugador · Carrusel (2000×2500)</h1>

<div class="loader-panel" id="loaderPanel">
  <div class="loader-title">Cargar nuevo jugador</div>
  <div class="loader-sub">Pega aquí el link de FotMob y el bloque de datos que te dio el chat</div>
  <input type="text" id="linkInput" class="loader-input" placeholder="https://www.fotmob.com/es/players/.../nombre-jugador">
  <textarea id="dataInput" class="loader-textarea" placeholder='Pega aquí el bloque JSON de datos'></textarea>
  <div class="photo-upload-row">
    <label class="photo-upload-label" for="photoFileInput">📷 Subir foto desde galería/archivos</label>
    <input type="file" id="photoFileInput" accept="image/*" style="display:none" onchange="handlePhotoUpload(this)">
  </div>
  <div class="loader-actions">
    <button class="export-btn" onclick="loadFromPanel()">Cargar datos</button>
    <button class="export-btn secondary" onclick="copiarPromptAlPortapapeles()">Copiar Prompt Extractor</button>
    <button class="export-btn secondary" onclick="resetToDefault()">Restaurar Oyarzabal</button>
  </div>
  <div class="loader-status" id="loaderStatus"></div>
</div>

<div class="stage">
  <div class="track" id="track"></div>
</div>

<div class="controls">
  <button class="nav-btn" onclick="prevSlide()">‹</button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" onclick="nextSlide()">›</button>
</div>

<div class="export-row">
  <button class="export-btn" onclick="exportCurrentSlide()">Exportar diapositiva (2000×2500)</button>
  <button class="export-btn secondary" onclick="exportAllSlides()">Exportar todas</button>
</div>
<div class="status" id="status"></div>

<script>
  const track = document.getElementById('track');
  const dotsWrap = document.getElementById('dots');
  const statusEl = document.getElementById('status');
  const loaderStatus = document.getElementById('loaderStatus');
  const linkInput = document.getElementById('linkInput');
  const dataInput = document.getElementById('dataInput');
  let current = 0;
  let slides = [];
  let currentSlug = 'oyarzabal';

  // Coordenadas aproximadas (%) de posiciones sobre el campo, estilo FotMob
  const POS_COORDS = {
    GK:{x:50,y:92}, RB:{x:82,y:74}, RCB:{x:62,y:80}, CB:{x:50,y:80}, LCB:{x:38,y:80}, LB:{x:18,y:74},
    DM:{x:50,y:62}, RDM:{x:65,y:64}, LDM:{x:35,y:64},
    RM:{x:82,y:46}, CM:{x:50,y:50}, LM:{x:18,y:46},
    AM:{x:50,y:32}, RW:{x:82,y:20}, LW:{x:18,y:20},
    RF:{x:65,y:12}, LF:{x:35,y:12}, CF:{x:50,y:10}, ST:{x:50,y:10}
  };

  const DEFAULT_DATA = {
    link: "https://www.fotmob.com/es/players/678234/mikel-oyarzabal",
    slug: "oyarzabal",
    name: "Mikel Oyarzabal",
    team: "Real Sociedad",
    photo: "https://images.fotmob.com/image_resources/playerimages/678234.png",
    age: 29,
    height: "180 cm",
    foot: "Izquierdo",
    nationality: "España",
    marketValue: "31 M €",
    position: {
      primary: { code:"ST", label:"Delantero centro" },
      others: [ {code:"LW", label:"Extremo izquierdo"}, {code:"RW", label:"Extremo derecho"} ]
    },
    traits: [
      {name:"Toques", pct:87},
      {name:"Oport. creadas", pct:88},
      {name:"Aéreo ganado", pct:25},
      {name:"Acciones defensivas", pct:38},
      {name:"Goles", pct:89},
      {name:"Disparos intentados", pct:64}
    ],
    season: {
      league: "LaLiga 2025/2026",
      goals:15, assists:4, matches:34, started:30, minutes:2714, rating:"7.29"
    }
  };

  function copiarPromptAlPortapapeles() {
    const textoACopiar = `Actúa como un extractor de datos de fútbol profesional. Voy a pasarte un enlace de FotMob de un jugador. Tu tarea es navegar por su perfil, extraer sus estadísticas actuales de la temporada liguera y sus rasgos de rendimiento (el gráfico del hexágono) para formatearlos en un bloque de código JSON limpio que necesito para mi aplicación.
Es obligatorio que sigas estrictamente estas reglas de formato para que mi herramienta no falle:

position (Posición): El campo code de la posición primaria (primary.code) DEBE ser exclusivamente uno de estos códigos válidos según lo que veas en su perfil: GK, RB, RCB, CB, LCB, LB, DM, RDM, LDM, RM, CM, LM, AM, RW, LW, RF, LF, CF, ST.
traits (Rasgos) - REGLA DE SIMPLIFICACIÓN CRÍTICA: Selecciona exactamente los 6 rasgos principales del gráfico del hexágono del jugador con sus respectivos porcentajes (pct). Debes traducir los nombres al español si están en inglés, eliminar cualquier tipo de paréntesis (), guiones o aclaraciones, y abreviar obligatoriamente los textos largos para mantenerlos muy cortos y limpios. Aplica estos ejemplos de simplificación:
"Asistencias esperadas" o "Goles esperados" ➔ cambiar por "Asist. esperadas" o "Goles esperados" (o "xG / xA")
"Goles esperados sin penaltis (npxG)" ➔ cambiar por "xG sin penaltis"
"Oportunidades creadas" ➔ cambiar por "Oport. creadas" o "Ocasiones creadas"
"Disparos intentados" o "Disparos totales" ➔ cambiar por "Disparos"
"Pases del tercio final" ➔ cambiar por "Pases 3er tercio"
"Entradas ganadas" o "Acciones defensivas" ➔ cambiar por "Entradas" o "Defensa"
"Pases largos precisos" ➔ cambiar por "Pases largos"
season (Temporada): Extrae los goles, asistencias, partidos jugados, partidos como titular, minutos y la puntuación (rating) media de la liga actual.
Respuesta limpia: Devuelve ÚNICAMENTE el bloque de código JSON, sin textos de introducción ni saludos, dentro de un bloque de código markdown.
Estructura exacta a rellenar:
JSON

{
  "link": "PEGA_AQUÍ_EL_ENLACE",
  "slug": "nombre-del-jugador-en-minusculas",
  "name": "Nombre Completo del Jugador",
  "team": "Nombre del Equipo",
  "photo": "URL de la foto de perfil del jugador que usa FotMob",
  "age": 0,
  "height": "000 cm",
  "foot": "Izquierdo o Derecho",
  "nationality": "País",
  "marketValue": "Valor de mercado actual (ej: 45 M €)",
  "position": {
    "primary": { "code": "CÓDIGO_VÁLIDO", "label": "Nombre posición en español" }
  },
  "traits": [
    {"name": "Rasgo Corto 1", "pct": 0},
    {"name": "Rasgo Corto 2", "pct": 0},
    {"name": "Rasgo Corto 3", "pct": 0},
    {"name": "Rasgo Corto 4", "pct": 0},
    {"name": "Rasgo Corto 5", "pct": 0},
    {"name": "Rasgo Corto 6", "pct": 0}
  ],
  "season": {
    "league": "Nombre de la Liga y Año (ej: LaLiga 2025/2026)",
    "goals": 0,
    "assists": 0,
    "matches": 0,
    "started": 0,
    "minutes": 0,
    "rating": "0.00"
  }
}
Aquí tienes el enlace del jugador a procesar:`;

    // Intentar primero con la API moderna si está disponible y es un entorno seguro
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(textoACopiar)
        .then(() => {
          loaderStatus.textContent = "¡Prompt copiado al portapapeles! ✓";
          setTimeout(() => loaderStatus.textContent = "", 3000);
        })
        .catch(err => ejecutarCopiaClasica(textoACopiar));
    } else {
      // Método de respaldo clásico (Funciona en local file:///)
      ejecutarCopiaClasica(textoACopiar);
    }
  }

  function ejecutarCopiaClasica(texto) {
    const textArea = document.createElement("textarea");
    textArea.value = texto;
    textArea.style.position = "fixed";
    textArea.style.left = "-999999px";
    document.body.appendChild(textArea);
    textArea.select();
    try {
      document.execCommand('copy');
      loaderStatus.textContent = "¡Prompt copiado al portapapeles! ✓";
    } catch (err) {
      console.error("Error al copiar: ", err);
      loaderStatus.textContent = "No se pudo copiar el texto automáticamente.";
    }
    document.body.removeChild(textArea);
    setTimeout(() => loaderStatus.textContent = "", 3000);
  }

  function slideShell(tag, inner){
    return `<div class="slide">
      <div class="top-row">
        <div class="wordmark">Player Stats</div>
        <div class="slide-tag">${tag}</div>
      </div>
      ${inner}
    </div>`;
  }

  function buildProfileSlide(d){
    const primaryCoord = POS_COORDS[d.position.primary.code] || {x:50,y:50};
    // Campo estrecho en formato retrato: viewBox 0 100 x 140.
    // Reutilizamos el porcentaje "y" de POS_COORDS (0-100) escalado a la altura 140 del nuevo viewBox.
    const pitchH = 140;
    const bx = primaryCoord.x;
    const by = (primaryCoord.y/100) * pitchH;

    return slideShell("Perfil", `
      <div class="head-row">
        <div class="headshot-sm"><img src="${d.photo}" crossorigin="anonymous"></div>
        <div class="head-text">
          <div class="p-name">${d.name}</div>
          <div class="p-team">${d.team}</div>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-cell"><div class="lbl">Edad</div><div class="val">${d.age}</div></div>
        <div class="info-cell"><div class="lbl">Altura</div><div class="val">${d.height}</div></div>
        <div class="info-cell"><div class="lbl">Pie bueno</div><div class="val">${d.foot}</div></div>
        <div class="info-cell"><div class="lbl">Nacionalidad</div><div class="val">${d.nationality}</div></div>
        <div class="info-cell full"><div class="lbl">Valor de mercado</div><div class="val">${d.marketValue}</div></div>
      </div>

      <div class="pos-card">
        <div class="pos-text">
          <div class="pos-title">Posición</div>
          <div class="pos-sub-label">Primaria</div>
          <div class="pos-primary-name">${d.position.primary.label}</div>
        </div>
        <div class="pos-pitch-wrap">
          <svg class="pitch-svg-narrow" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="96" height="136" rx="8" fill="#1d1d1d" stroke="#2a2a2a" stroke-width="1"></rect>
            <line x1="2" y1="70" x2="98" y2="70" stroke="#2a2a2a" stroke-width="0.8"></line>
            <circle cx="50" cy="70" r="15" fill="none" stroke="#2a2a2a" stroke-width="0.8"></circle>
            <rect x="24" y="2" width="52" height="22" fill="none" stroke="#2a2a2a" stroke-width="0.8"></rect>
            <rect x="24" y="116" width="52" height="22" fill="none" stroke="#2a2a2a" stroke-width="0.8"></rect>
            <rect x="38" y="2" width="24" height="9" fill="none" stroke="#2a2a2a" stroke-width="0.8"></rect>
            <rect x="38" y="129" width="24" height="9" fill="none" stroke="#2a2a2a" stroke-width="0.8"></rect>
            <g>
              <rect x="${bx-13}" y="${by-7}" width="26" height="14" rx="7" fill="#0067b1"></rect>
              <text x="${bx}" y="${by+2.6}" text-anchor="middle" font-size="6.4" fill="#ffffff" font-weight="800">${d.position.primary.code}</text>
            </g>
          </svg>
        </div>
      </div>
    `);
  }

  function buildTraitsSlide(d){
    const traits = d.traits.slice(0,6);
    const n = traits.length;
    const cx = 50, cy = 55, R = 27;
    const angleFor = i => (-90 + i*(360/n)) * Math.PI/180;

    const vertices = traits.map((t,i)=>{
      const a = angleFor(i);
      return { x: cx + R*Math.cos(a), y: cy + R*Math.sin(a) };
    });

    // Cuñas decorativas de fondo (estilo hexágono FotMob)
    const wedgeOpacities = [0.10,0.04,0.07,0.10,0.055,0.09];
    let wedges = '';
    for(let i=0;i<n;i++){
      const v1 = vertices[i];
      const v2 = vertices[(i+1)%n];
      const op = wedgeOpacities[i % wedgeOpacities.length];
      wedges += `<path d="M ${cx} ${cy} L ${v1.x.toFixed(2)} ${v1.y.toFixed(2)} L ${v2.x.toFixed(2)} ${v2.y.toFixed(2)} Z" fill="#ffffff" fill-opacity="${op}"></path>`;
    }

    // Malla: 3 hexágonos concéntricos discontinuos
    let gridPolys = '';
    [0.33,0.66,1].forEach(level=>{
      const pts = traits.map((t,i)=>{
        const a = angleFor(i);
        const r = R*level;
        return `${(cx+r*Math.cos(a)).toFixed(2)},${(cy+r*Math.sin(a)).toFixed(2)}`;
      }).join(' ');
      gridPolys += `<polygon points="${pts}" fill="none" stroke="#3a3a3a" stroke-width="0.4" stroke-dasharray="1.5,1.5"></polygon>`;
    });

    // Líneas de eje desde el centro
    let axisLines = '';
    traits.forEach((t,i)=>{
      const a = angleFor(i);
      axisLines += `<line x1="${cx}" y1="${cy}" x2="${(cx+R*Math.cos(a)).toFixed(2)}" y2="${(cy+R*Math.sin(a)).toFixed(2)}" stroke="#3a3a3a" stroke-width="0.4"></line>`;
    });

    // Polígono de datos reales
    const dataPts = traits.map((t,i)=>{
      const a = angleFor(i);
      const r = R*(t.pct/100);
      return `${(cx+r*Math.cos(a)).toFixed(2)},${(cy+r*Math.sin(a)).toFixed(2)}`;
    }).join(' ');

    // Etiquetas: nombre completo (con salto de línea si es largo) + porcentaje
    let labels = '';
  traits.forEach((t,i)=>{
  const a = angleFor(i);
  
  // Distancia base para los lados
  let lr = R + 5.5; 
  
  // Ajustes específicos
  if (i === 0) {
    lr = R + 8.0; // Aumenta este número para ALEJAR el texto de ARRIBA
  } else if (i === 3) {
    lr = R + 11.0; // Aumenta este número para ALEJAR el texto de ABAJO
  }

  const lx = cx + lr*Math.cos(a);
  const ly = cy + lr*Math.sin(a);
      const cosA = Math.cos(a);
      const anchor = cosA > 0.3 ? 'start' : (cosA < -0.3 ? 'end' : 'middle');

      const words = t.name.split(' ');
      let line1 = t.name, line2 = '';
      if(t.name.length > 13 && words.length > 1){
        const mid = Math.ceil(words.length/2);
        line1 = words.slice(0,mid).join(' ');
        line2 = words.slice(mid).join(' ');
      }

      if(line2){
        labels += `
          <text x="${lx.toFixed(2)}" y="${(ly-4.5).toFixed(2)}" text-anchor="${anchor}" font-size="4.2" fill="#ffffff" font-weight="600">${line1}</text>
          <text x="${lx.toFixed(2)}" y="${(ly-0.5).toFixed(2)}" text-anchor="${anchor}" font-size="4.2" fill="#ffffff" font-weight="600">${line2}</text>
          <text x="${lx.toFixed(2)}" y="${(ly+5.0).toFixed(2)}" text-anchor="${anchor}" font-size="4.8" fill="#0067b1" font-weight="600">${t.pct}%</text>
        `;
      } else {
        labels += `
          <text x="${lx.toFixed(2)}" y="${(ly-1.5).toFixed(2)}" text-anchor="${anchor}" font-size="4.2" fill="#ffffff" font-weight="600">${line1}</text>
          <text x="${lx.toFixed(2)}" y="${(ly+4.5).toFixed(2)}" text-anchor="${anchor}" font-size="4.8" fill="#0067b1" font-weight="600">${t.pct}%</text>
        `;
      }
    });

    return slideShell("Rasgos", `
      <div class="sec-title">Rasgos del jugador</div>
      <div class="sec-sub">Comparado con jugadores de su posición</div>
      <div class="hex-wrap">
        <svg class="hex-svg" viewBox="-6.5 0 113 112" style="width: 113%; margin-left: -6.5%;" xmlns="http://www.w3.org/2000/svg">
          ${wedges}
          ${gridPolys}
          ${axisLines}
          <polygon points="${dataPts}" fill="#0067b1" fill-opacity="0.35" stroke="#0067b1" stroke-width="0.9"></polygon>
          <circle cx="${cx}" cy="${cy}" r="1.3" fill="#0067b1"></circle>
          ${labels}
        </svg>
      </div>
    `);
  }

  function buildSeasonSlide(d){
    const s = d.season;
    return slideShell("Temporada", `
      <div class="sec-title">Estadísticas</div>
      <div class="league-row"><div class="league-dot"></div><div class="league-name">${s.league}</div></div>
      <div class="stat-grid">
        <div class="stat-cell"><div class="num">${s.goals}</div><div class="lbl">Goles</div></div>
        <div class="stat-cell"><div class="num">${s.assists}</div><div class="lbl">Asistencias</div></div>
        <div class="stat-cell"><div class="num">${s.matches}</div><div class="lbl">Partidos</div></div>
        <div class="stat-cell"><div class="num">${s.started}</div><div class="lbl">Titular</div></div>
        <div class="stat-cell"><div class="num">${s.minutes}</div><div class="lbl">Minutos</div></div>
        <div class="stat-cell"><div class="num rating-badge">${s.rating}</div><div class="lbl">Puntuación</div></div>
      </div>
      <div class="footer-mini">Datos: FotMob · ${d.name}</div>
    `);
  }

  function buildSlides(d){
    return [
      buildProfileSlide(d),
      buildTraitsSlide(d),
      buildSeasonSlide(d)
    ];
  }

  function mountData(d){
    track.innerHTML = buildSlides(d).join('');
    slides = document.querySelectorAll('.slide');
    current = 0;
    currentSlug = d.slug || d.name.toLowerCase().replace(/[^a-z0-9]+/g,'-');

    dotsWrap.innerHTML = '';
    slides.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i===0 ? ' active' : '');
      dotsWrap.appendChild(dot);
    });
    render();
  }

  function render(){
    slides.forEach((s,i)=>{ s.style.display = i===current ? 'flex' : 'none'; });
    document.querySelectorAll('.dot').forEach((d,i)=> d.classList.toggle('active', i===current));
  }
  function nextSlide(){ current = (current+1) % slides.length; render(); }
  function prevSlide(){ current = (current-1+slides.length) % slides.length; render(); }

  function handlePhotoUpload(input){
    const file = input.files && input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
      const img = track.querySelector('.headshot-sm img');
      if(img) img.src = e.target.result;
      loaderStatus.textContent = 'Foto cargada ✓';
    };
    reader.readAsDataURL(file);
  }

  async function captureSlide(el){
    return await html2canvas(el, { backgroundColor: '#000000', scale: 5, useCORS: true, width:400, height:500 });
  }
  const isIOS = /iP(hone|od|ad)/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  function canvasToBlob(canvas){
    return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
  }

  async function downloadCanvas(canvas, filename){
    const blob = await canvasToBlob(canvas);
    const file = new File([blob], filename, { type: 'image/png' });

    // En iOS Safari, un <a download> con click() programático casi nunca
    // dispara la descarga (Safari lo bloquea si no viene de un gesto directo
    // del usuario, y un await previo ya "rompe" ese gesto). Usamos el share
    // sheet nativo, que sí funciona y deja "Guardar en Fotos".
    if (isIOS && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: filename });
        return;
      } catch (err) {
        if (err && err.name === 'AbortError') return; // usuario cerró el share sheet
      }
    }

    const url = URL.createObjectURL(blob);
    if (isIOS) {
      // Fallback: abrir en pestaña nueva para hacer toque largo -> Añadir a Fotos
      window.open(url, '_blank');
    } else {
      const link = document.createElement('a');
      link.download = filename;
      link.href = url;
      link.click();
    }
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  }
  async function exportCurrentSlide(){
    statusEl.textContent = 'Generando imagen 2000×2500...';
    const canvas = await captureSlide(slides[current]);
    await downloadCanvas(canvas, `${currentSlug}-slide-${current+1}.png`);
    statusEl.textContent = 'Descargado ✓';
    setTimeout(()=> statusEl.textContent = '', 2000);
  }
  async function exportAllSlides(){
    statusEl.textContent = 'Generando todas las imágenes...';
    for(let i=0; i<slides.length; i++){
      const wasDisplay = slides[i].style.display;
      slides[i].style.display = 'flex';
      const canvas = await captureSlide(slides[i]);
      slides[i].style.display = wasDisplay;
      statusEl.textContent = `Descargando ${i+1}/${slides.length}...`;
      await downloadCanvas(canvas, `${currentSlug}-slide-${i+1}.png`);
      await new Promise(r => setTimeout(r, 400));
    }
    statusEl.textContent = 'Todas las diapositivas descargadas ✓';
    setTimeout(()=> statusEl.textContent = '', 2500);
  }

  function loadFromPanel(){
    const raw = dataInput.value.trim();
    if(!raw){ loaderStatus.textContent = 'Pega primero el bloque de datos que te dio el chat.'; return; }
    let parsed;
    try{ parsed = JSON.parse(raw); }
    catch(e){ loaderStatus.textContent = 'Ese texto no es JSON válido. Revisa que lo hayas copiado completo.'; return; }
    if(linkInput.value.trim()) parsed.link = linkInput.value.trim();
    try{
      mountData(parsed);
      loaderStatus.textContent = `Cargado: ${parsed.name || 'jugador'} ✓`;
    }catch(e){
      loaderStatus.textContent = 'Los datos no tienen el formato esperado.';
    }
  }

  function resetToDefault(){
    linkInput.value = '';
    dataInput.value = '';
    mountData(DEFAULT_DATA);
    loaderStatus.textContent = 'Restaurado a Mikel Oyarzabal.';
  }

  mountData(DEFAULT_DATA);
</script>

</body>
</html>
