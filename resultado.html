  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d1b2a; --navy2: #111f30; --gold: #c9a84c; --gold2: #e8c86a;
    --surface: #182436; --border: #243448; --text: #e8eaf0; --muted: #7a8fa8;
    --green: #4caf76; --red: #e05555;
  }
  body { background:#080f18; color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  header { width:100%; background:var(--navy2); border-bottom:1px solid var(--border); padding:14px 28px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  .logo { font-size:13px; font-weight:800; letter-spacing:.12em; color:var(--gold); text-transform:uppercase; }
  .match-badge { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:30px; padding:6px 16px; }
  .match-team { font-size:14px; font-weight:700; color:var(--text); letter-spacing:.03em; }
  .match-vs { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
  .match-loading { font-size:12px; color:var(--muted); font-style:italic; }
  .spacer { flex:1; }
  .data-pill { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:background .3s; }
  .dot.ok { background:var(--green); box-shadow:0 0 6px var(--green); }
  .dot.err { background:var(--red); }
  .dot.pulse { background:#5ab0ff; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .toolbar { width:100%; background:var(--navy); border-bottom:1px solid var(--border); padding:10px 28px; display:flex; align-items:center; gap:10px; }
  .btn { display:inline-flex; align-items:center; gap:7px; padding:8px 18px; border-radius:8px; font-size:13px; font-weight:600; border:none; cursor:pointer; transition:all .15s; letter-spacing:.03em; }
  .btn-outline { background:transparent; color:var(--text); border:1px solid var(--border); }
  .btn-outline:hover { border-color:var(--gold); color:var(--gold); }
  .btn-export { background:var(--gold); color:var(--navy); }
  .btn-export:hover { background:var(--gold2); }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .canvas-area { flex:1; width:100%; display:flex; align-items:flex-start; justify-content:center; overflow:auto; padding:36px 20px 80px; }
  .canvas-wrap { transform-origin:top center; position:relative; }
  #card { width:2000px; height:2500px; position:relative; overflow:hidden; background:#00b140; transform-origin:top left; }
  #card-bg { position:absolute; top:0; left:0; width:2000px; height:2500px; object-fit:fill; display:none; z-index:0; }
  .card-layer { position:absolute; line-height:1; }
  .zoom-bar { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:30px; padding:7px 18px; font-size:12px; z-index:200; box-shadow:0 4px 20px #0007; }
  .zoom-bar button { background:none; border:none; color:var(--text); font-size:17px; cursor:pointer; line-height:1; padding:0 4px; transition:color .15s; }
  .zoom-bar button:hover { color:var(--gold); }
  .zoom-val { min-width:44px; text-align:center; font-weight:700; color:var(--gold); font-size:13px; }
  .zoom-fit { font-size:11px; color:var(--muted); cursor:pointer; padding:2px 8px; border-left:1px solid var(--border); }
  .zoom-fit:hover { color:var(--gold); }
  .updated { font-size:10px; color:var(--muted); opacity:.7; }
</style>
</head>

<div class="zoom-bar">
  <button onclick="zoom(-0.05)">−</button>
  <span class="zoom-val" id="zoomVal">15%</span>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const DATA_URL = "https://script.google.com/macros/s/AKfycbyK9bf932Rbj1WgNuWVi8Sc1Y4kFW4JXNoZoQv2t3R0U4YQ-UEx6xfwAEghSTm-81kw/exec";
const KEY_HOME = 'Local';
const KEY_AWAY = 'Visitante';
const REFRESH_INTERVAL = 60000;
const GITHUB_BASE = 'https://raw.githubusercontent.com/1909rso/1909rso.github.io/refs/heads/main/resultaue/';

// ═══════════════════════════════════════════════════
// TEXT LAYERS CONFIG
// ═══════════════════════════════════════════════════
const TEXT_CFG = {
  xLocal_Min: -1027,
  xLocal_Jug: -1218,
  xVis_Min:   1027,
  xVis_Jug:   1216,
  sizejugador: 41,
  sizeMinuto:  33,
  y1:    1938,
  rowGap: 58,
};

// ═══════════════════════════════════════════════════
// ICON LAYERS CONFIG
// ═══════════════════════════════════════════════════
const ICON_CFG = { x:0, y:0, width:2000, height:2500 };
const ICON_LAYERS = [
  {id:'layer-icon-1_L',key:'1_L_Tipo',folder:'1_L'},
  {id:'layer-icon-2_L',key:'2_L_Tipo',folder:'2_L'},
  {id:'layer-icon-3_L',key:'3_L_Tipo',folder:'3_L'},
  {id:'layer-icon-4_L',key:'4_L_Tipo',folder:'4_L'},
  {id:'layer-icon-5_L',key:'5_L_Tipo',folder:'5_L'},
  {id:'layer-icon-6_L',key:'6_L_Tipo',folder:'6_L'},
  {id:'layer-icon-7_L',key:'7_L_Tipo',folder:'7_L'},
  {id:'layer-icon-8_L',key:'8_L_Tipo',folder:'8_L'},
  {id:'layer-icon-1_V',key:'1_V_Tipo',folder:'1_V'},
  {id:'layer-icon-2_V',key:'2_V_Tipo',folder:'2_V'},
  {id:'layer-icon-3_V',key:'3_V_Tipo',folder:'3_V'},
  {id:'layer-icon-4_V',key:'4_V_Tipo',folder:'4_V'},
  {id:'layer-icon-5_V',key:'5_V_Tipo',folder:'5_V'},
  {id:'layer-icon-6_V',key:'6_V_Tipo',folder:'6_V'},
  {id:'layer-icon-7_V',key:'7_V_Tipo',folder:'7_V'},
  {id:'layer-icon-8_V',key:'8_V_Tipo',folder:'8_V'},
];

// ═══════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════
let scale = 0.15;
function applyScale() {
  const wrap = document.getElementById('canvasWrap');
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width  = Math.round(2000*scale)+'px';
  wrap.style.height = Math.round(2500*scale)+'px';
  document.getElementById('zoomVal').textContent = Math.round(scale*100)+'%';
}
function zoom(delta) { scale = Math.max(0.05,Math.min(1.5,scale+delta)); applyScale(); }
function zoomFit() {
  const area = document.querySelector('.canvas-area');
  const available = Math.min(area.clientWidth-40,(window.innerHeight-160)*(2000/2500));
  scale = parseFloat((available/2000).toFixed(2));
  applyScale();
}
applyScale();

// ═══════════════════════════════════════════════════
// BACKGROUND
// ═══════════════════════════════════════════════════
let bgDataUrl = null;
function loadBackground(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    bgDataUrl = e.target.result;
    const bg = document.getElementById('card-bg');
    bg.src = bgDataUrl;
    bg.style.display = 'block';
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
let sheetData = {};
function setStatus(state, msg) {
  document.getElementById('statusDot').className = 'dot '+state;
  document.getElementById('statusText').textContent = msg;
}
function fetchData() {
  setStatus('pulse','Actualizando…');
  fetch(DATA_URL)
    .then(r=>r.text())
    .then(text=>{
      sheetData = JSON.parse(text)[0];
      applyDataToLayers();
      updateMatchHeader();
      setStatus('ok','Datos al día');
      const now = new Date();
      document.getElementById('updatedAt').textContent =
        '- '+now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    })
    .catch(err=>{ setStatus('err','Error al cargar'); console.error(err); });
}

function applyDataToLayers() {
  applyLayerStyles();
  applyIconLayers();
  applyTextLayers();
}

function imgLayer(id, url, cfg) {
  const el = document.getElementById(id);
  if (!el) return;
  if (cfg) {
    el.style.left   = cfg.x+'px';
    el.style.top    = cfg.y+'px';
    el.style.width  = cfg.width+'px';
    el.style.height = cfg.height+'px';
  }
  if (url) { el.src = url; el.style.display = 'block'; }
  else { el.style.display = 'none'; }
}

function applyLayerStyles() {
  const fullCfg = {x:0,y:0,width:2000,height:2500};

  // EST
  var estVal = sheetData['EST'];
  imgLayer('layer-est',
    (estVal!==undefined&&estVal!==null&&estVal!=='') ? GITHUB_BASE+'est/'+parseInt(estVal,10)+'.PNG' : null,
    fullCfg);

  // Local escudo
  var lv = sheetData['Local'];
  imgLayer('layer-local', lv ? GITHUB_BASE+'local/'+lv+'.png' : null, fullCfg);

  // Visitante escudo
  var vv = sheetData['Visitante'];
  imgLayer('layer-visitante', vv ? GITHUB_BASE+'visitante/'+vv+'.png' : null, fullCfg);

  // comp
  var cv = sheetData['comp'];
  imgLayer('layer-comp', (cv&&cv!=='') ? GITHUB_BASE+'comp/'+cv+'.png' : null, fullCfg);

  // Res_local número
  var rl = sheetData['Res_local'];
  imgLayer('layer-numlocal', (rl!==undefined&&rl!==null) ? GITHUB_BASE+'numerolocal/'+String(rl)+'.png' : null, fullCfg);

  // Res_Vis número
  var rv = sheetData['Res_Vis'];
  imgLayer('layer-numvisitante', (rv!==undefined&&rv!==null) ? GITHUB_BASE+'numerovisitante/'+String(rv)+'.png' : null, fullCfg);
}

function applyIconLayers() {
  ICON_LAYERS.forEach(function(layer) {
    var el = document.getElementById(layer.id);
    if (!el) return;
    el.style.left=ICON_CFG.x+'px'; el.style.top=ICON_CFG.y+'px';
    el.style.width=ICON_CFG.width+'px'; el.style.height=ICON_CFG.height+'px';
    var val = sheetData[layer.key];
    if (val!==undefined&&val!==null&&val!=='') {
      el.src = GITHUB_BASE+'icons/'+layer.folder+'/'+layer.folder+'_'+val+'.png';
      el.style.display = 'block';
    } else { el.style.display='none'; }
  });
}

function applyTextLayers() {
  for (var n=1;n<=8;n++) { applyEventText(n,'L'); applyEventText(n,'V'); }
}

function applyEventText(n, side) {
  var cfg    = TEXT_CFG;
  var keyJug = n+'_'+side+'_Jug';
  var keyMin = n+'_'+side+'_Min';
  var keyTipo= n+'_'+side+'_Tipo';
  var valJug = sheetData[keyJug]||'';
  var valMin = sheetData[keyMin]||'';
  var valTipo= sheetData[keyTipo]||'';
  var elJug  = document.getElementById('txt-'+keyJug);
  var elMin  = document.getElementById('txt-'+keyMin);
  if (!elJug||!elMin) return;
  if (!valTipo) { elJug.style.visibility='hidden'; elMin.style.visibility='hidden'; return; }
  var rowY = cfg.y1+(n-1)*cfg.rowGap;
  // Reset todos los estilos de posición
  [elJug, elMin].forEach(function(el) {
    el.style.left='auto'; el.style.right='auto';
    el.style.width='auto'; el.style.paddingRight='0px';
    el.style.top=rowY+'px';
  });
  elJug.style.fontSize=cfg.sizejugador+'px';
  elMin.style.fontSize=cfg.sizeMinuto+'px';
  if (side==='L') {
    // Alineación derecha: usamos right = distancia desde borde derecho (valor positivo)
    // xLocal_Min y xLocal_Jug son negativos → los convertimos a positivos para right
    elMin.style.right = Math.abs(cfg.xLocal_Min)+'px';
    elMin.style.textAlign='right';
    elJug.style.right = Math.abs(cfg.xLocal_Jug)+'px';
    elJug.style.textAlign='right';
  } else {
    elMin.style.left=cfg.xVis_Min+'px'; elMin.style.textAlign='left';
    elJug.style.left=cfg.xVis_Jug+'px'; elJug.style.textAlign='left';
  }
  elMin.textContent = valMin!=='' ? valMin+"'" : '';
  elJug.textContent = valJug;
  elMin.style.visibility = valMin!=='' ? 'visible' : 'hidden';
  elJug.style.visibility = valJug!=='' ? 'visible' : 'hidden';
}

function updateMatchHeader() {
  const homeEl = document.getElementById('matchHome');
  const awayEl = document.getElementById('matchAway');
  homeEl.textContent = sheetData['Local']||'—';
  awayEl.textContent = sheetData['Visitante']||'—';
  homeEl.className='match-team'; awayEl.className='match-team';
}

// ═══════════════════════════════════════════════════
// EXPORT — Canvas 2D manual con overlay aplicado a mano
// ═══════════════════════════════════════════════════
function loadImg(src) {
  return new Promise((res,rej)=>{
    if (!src) { res(null); return; }
    const img = new Image();
    img.crossOrigin='anonymous';
    img.onload = ()=>res(img);
    img.onerror= ()=>{ console.warn('No se pudo cargar:',src); res(null); };
    img.src = src;
  });
}

async function exportCard() {
  const btn = document.getElementById('exportBtn');
  btn.disabled=true; btn.textContent='⏳ Generando…';

  const W=2000, H=2500;

  function loadImg(src) {
    return new Promise((res)=>{
      if (!src) { res(null); return; }
      const img = new Image();
      img.crossOrigin='anonymous';
      img.onload = ()=>res(img);
      img.onerror= ()=>{ console.warn('No se pudo cargar:',src); res(null); };
      img.src = src;
    });
  }

  try {
    // ── CANVAS PRINCIPAL: todas las capas de imagen ──
    const canvas = document.createElement('canvas');
    canvas.width=W; canvas.height=H;
    const ctx = canvas.getContext('2d');

    function draw(img, blend) {
      if (!img) return;
      ctx.globalCompositeOperation = blend||'source-over';
      ctx.drawImage(img, 0, 0, W, H);
    }

    ctx.fillStyle='#00b140';
    ctx.fillRect(0,0,W,H);

    if (bgDataUrl) draw(await loadImg(bgDataUrl));
    draw(await loadImg(document.getElementById('layer-luzysombra').src));

    var estEl = document.getElementById('layer-est');
    if (estEl.style.display!=='none' && estEl.src)
      draw(await loadImg(estEl.src), 'overlay');
    ctx.globalCompositeOperation='source-over';

    draw(await loadImg(document.getElementById('layer-lauki').src));
    draw(await loadImg(document.getElementById('layer-logos').src));

    var nlEl=document.getElementById('layer-numlocal');
    if (nlEl.style.display!=='none'&&nlEl.src) draw(await loadImg(nlEl.src));
    var nvEl=document.getElementById('layer-numvisitante');
    if (nvEl.style.display!=='none'&&nvEl.src) draw(await loadImg(nvEl.src));

    draw(await loadImg(document.getElementById('layer-guion').src));

    var locEl=document.getElementById('layer-local');
    if (locEl.style.display!=='none'&&locEl.src) draw(await loadImg(locEl.src));
    var visEl=document.getElementById('layer-visitante');
    if (visEl.style.display!=='none'&&visEl.src) draw(await loadImg(visEl.src));
    var compEl=document.getElementById('layer-comp');
    if (compEl.style.display!=='none'&&compEl.src) draw(await loadImg(compEl.src));

    // ── CAPA DE TEXTO: capturada del DOM con html2canvas ──
    // Crear un contenedor temporal invisible con SOLO los divs de texto
    const txtContainer = document.createElement('div');
    txtContainer.style.cssText = 'position:fixed;left:-9999px;top:0;width:2000px;height:2500px;overflow:hidden;background:transparent;pointer-events:none;';

    // Copiar todos los divs de texto visibles al contenedor temporal
    var allTxt = document.querySelectorAll('[id^="txt-"]');
    allTxt.forEach(function(el) {
      if (el.style.visibility === 'hidden') return;
      var clone = el.cloneNode(true);
      clone.style.position   = 'absolute';
      clone.style.top        = el.style.top || '0px';
      clone.style.left       = el.style.left !== 'auto' ? el.style.left : 'auto';
      clone.style.right      = el.style.right !== 'auto' ? el.style.right : 'auto';
      clone.style.textAlign  = el.style.textAlign;
      clone.style.fontSize   = el.style.fontSize;
      clone.style.fontFamily = el.style.fontFamily;
      clone.style.fontWeight = el.style.fontWeight;
      clone.style.color      = el.style.color;
      clone.style.whiteSpace = el.style.whiteSpace;
      clone.style.lineHeight = el.style.lineHeight;
      clone.style.visibility = 'visible';
      txtContainer.appendChild(clone);
    });
    document.body.appendChild(txtContainer);

    // Capturar el contenedor con html2canvas
    var txtCanvas = await html2canvas(txtContainer, {
      width: 2000,
      height: 2500,
      scale: 1,
      backgroundColor: null,
      useCORS: true,
      logging: false,
    });
    document.body.removeChild(txtContainer);

    // Fusionar la capa de texto encima del canvas principal
    ctx.globalCompositeOperation='source-over';
    ctx.drawImage(txtCanvas, 0, 0, W, H);

    // ── ICONOS ──
    for (var layer of ICON_LAYERS) {
      var iconEl=document.getElementById(layer.id);
      if (iconEl.style.display!=='none'&&iconEl.src) draw(await loadImg(iconEl.src));
    }

    const link=document.createElement('a');
    link.download='1909rso_'+Date.now()+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();

  } catch(e) {
    alert('Error al exportar: '+e.message);
    console.error(e);
  }

  btn.disabled=false; btn.textContent='⬇ Descargar imagen';
  applyScale();
}


// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
fetchData();
setInterval(fetchData, REFRESH_INTERVAL);
</script>
