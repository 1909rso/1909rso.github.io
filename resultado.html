<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Editor — 1909 RSO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @font-face {
    font-family: 'Paralucent';
    font-weight: 500;
    src: url('https://github.com/1909rso/1909rso.github.io/raw/refs/heads/main/resultaue/paralucent/fonnts.com-Paralucent_Medium.otf') format('opentype');
  }
  @font-face {
    font-family: 'Paralucent';
    font-weight: 700;
    src: url('https://github.com/1909rso/1909rso.github.io/raw/refs/heads/main/resultaue/paralucent/fonnts.com-Paralucent_Bold.otf') format('opentype');
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d1b2a;
    --navy2: #111f30;
    --gold: #c9a84c;
    --gold2: #e8c86a;
    --surface: #182436;
    --border: #243448;
    --text: #e8eaf0;
    --muted: #7a8fa8;
    --green: #4caf76;
    --red: #e05555;
  }

  body {
    background: #080f18;
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }

  .logo {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .12em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .match-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 6px 16px;
  }
  .match-team {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .03em;
  }
  .match-vs {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .match-loading {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }

  .spacer { flex: 1; }

  .data-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.err { background: var(--red); }
  .dot.pulse {
    background: #5ab0ff;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── TOOLBAR ── */
  .toolbar {
    width: 100%;
    background: var(--navy);
    border-bottom: 1px solid var(--border);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .03em;
  }
  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-export {
    background: var(--gold);
    color: var(--navy);
  }
  .btn-export:hover { background: var(--gold2); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: auto;
    padding: 36px 20px 80px;
  }

  .canvas-wrap {
    transform-origin: top center;
    position: relative;
  }

  /* THE CARD */
  #card {
    width: 2000px;
    height: 2500px;
    position: relative;
    overflow: hidden;
    background: #00b140;
    transform-origin: top left;
  }

  #card-bg {
    position: absolute;
    top: 0; left: 0;
    width: 2000px;
    height: 2500px;
    object-fit: fill;
    display: none;
    z-index: 0;
  }

  .card-layer {
    position: absolute;
    line-height: 1;
  }

  /* ── ZOOM BAR ── */
  .zoom-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 7px 18px;
    font-size: 12px;
    z-index: 200;
    box-shadow: 0 4px 20px #0007;
  }
  .zoom-bar button {
    background: none; border: none;
    color: var(--text); font-size: 17px;
    cursor: pointer; line-height: 1; padding: 0 4px;
    transition: color .15s;
  }
  .zoom-bar button:hover { color: var(--gold); }
  .zoom-val {
    min-width: 44px; text-align: center;
    font-weight: 700; color: var(--gold);
    font-size: 13px;
  }
  .zoom-fit {
    font-size: 11px; color: var(--muted);
    cursor: pointer; padding: 2px 8px;
    border-left: 1px solid var(--border);
  }
  .zoom-fit:hover { color: var(--gold); }

  /* last-updated */
  .updated {
    font-size: 10px;
    color: var(--muted);
    opacity: .7;
  }
</style>

function applyScale() {
  const wrap = document.getElementById('canvasWrap');
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width  = Math.round(2000 * scale) + 'px';
  wrap.style.height = Math.round(2500 * scale) + 'px';
  document.getElementById('zoomVal').textContent = Math.round(scale * 100) + '%';
}

function zoom(delta) {
  scale = Math.max(0.05, Math.min(1.5, scale + delta));
  applyScale();
}

function zoomFit() {
  const area = document.querySelector('.canvas-area');
  const available = Math.min(area.clientWidth - 40, (window.innerHeight - 160) * (2000/2500));
  scale = parseFloat((available / 2000).toFixed(2));
  applyScale();
}

applyScale();

// ═══════════════════════════════════════════════════
// BACKGROUND
// ═══════════════════════════════════════════════════
function loadBackground(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const bg = document.getElementById('card-bg');
    bg.src = e.target.result;
    bg.style.display = 'block';
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
let sheetData = {};

function setStatus(state, msg) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className  = 'dot ' + state;
  text.textContent = msg;
}

function fetchData() {
  setStatus('pulse', 'Actualizando…');
  fetch(DATA_URL)
    .then(function(r) { return r.text(); })
    .then(function(text) {
      const data = JSON.parse(text);
      const obj = data[0];
      sheetData = obj;
      applyDataToLayers();
      updateMatchHeader();
      setStatus('ok', 'Datos al día');
      const now = new Date();
      document.getElementById('updatedAt').textContent =
        '- ' + now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
    })
    .catch(function(err) {
      setStatus('err', 'Error al cargar');
      console.error('fetchData error:', err);
    });
}

function applyDataToLayers() {
  applyLayerStyles();
  applyIconLayers();
  applyTextLayers();

  // Rellena elementos de texto genéricos: id="d-CLAVE"
  Object.keys(sheetData).forEach(function(key) {
    const safeKey = key.replace(/[\.\[\]]/g, '_');
    const el = document.getElementById('d-' + key) ||
               document.getElementById('d-' + safeKey);
    if (el) {
      const prefix = el.dataset.prefix || '';
      const suffix = el.dataset.suffix || '';
      el.textContent = prefix + String(sheetData[key] ?? '') + suffix;
    }
  });
}

function updateMatchHeader() {
  const homeEl = document.getElementById('matchHome');
  const awayEl = document.getElementById('matchAway');

  const home = findField(KEY_HOME) || '—';
  const away = findField(KEY_AWAY) || '—';

  homeEl.textContent = home;
  awayEl.textContent = away;
  homeEl.className = 'match-team';
  awayEl.className = 'match-team';
}

function findField(key) {
  if (sheetData[key] !== undefined) return sheetData[key];
  const lower = key.toLowerCase();
  const found = Object.keys(sheetData).find(function(k) {
    return k.toLowerCase() === lower ||
           k.toLowerCase().replace(/[^a-z]/g,'') === lower.replace(/[^a-z]/g,'');
  });
  return found ? sheetData[found] : null;
}

// ═══════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════
async function exportCard() {
  const btn = document.getElementById('exportBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Generando…';

  const wrap = document.getElementById('canvasWrap');
  const card = document.getElementById('card');

  wrap.style.transform = 'scale(1)';
  wrap.style.width  = '2000px';
  wrap.style.height = '2500px';

  await new Promise(function(r) { setTimeout(r, 100); });

  try {
    const canvas = await html2canvas(card, {
      width: 2000,
      height: 2500,
      scale: 1,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      logging: false,
      imageTimeout: 15000
    });

    const link = document.createElement('a');
    link.download = '1909rso_' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Error al exportar: ' + e.message);
    console.error(e);
  }

  applyScale();

  btn.disabled = false;
  btn.textContent = '⬇ Descargar imagen';
}



// ═══════════════════════════════════════════════════
// TEXT LAYERS CONFIG — edita aquí posición y tamaño
// ═══════════════════════════════════════════════════
const TEXT_CFG = {
  // Posición X del bloque local (el texto se alinea a la DERECHA desde este punto)
  xLocal:      900,
  // Posición X del bloque visitante (el texto se alinea a la IZQUIERDA desde este punto)
  xVisitante:  1100,
  // Tamaño fuente jugador (Medium) en px
  sizejugador: 52,
  // Tamaño fuente minuto (Bold) en px
  sizeMinuto:  52,
  // Separación horizontal entre minuto y jugador en px
  gapMin:      20,
  // Posición Y base de la fila 1, en px
  y1:          900,
  // Separación vertical entre filas en px
  rowGap:      110,
};

function applyTextLayers() {
  for (var n = 1; n <= 8; n++) {
    applyEventText(n, 'L');
    applyEventText(n, 'V');
  }
}

function applyEventText(n, side) {
  var cfg   = TEXT_CFG;
  var keyJug = n + '_' + side + '_Jug';
  var keyMin = n + '_' + side + '_Min';
  var keyTipo = n + '_' + side + '_Tipo';

  var valJug  = sheetData[keyJug]  || '';
  var valMin  = sheetData[keyMin]  || '';
  var valTipo = sheetData[keyTipo] || '';

  var elJug = document.getElementById('txt-' + keyJug);
  var elMin = document.getElementById('txt-' + keyMin);
  if (!elJug || !elMin) return;

  var rowY = cfg.y1 + (n - 1) * cfg.rowGap;

  // Hide if no event
  if (valTipo === '' || valTipo === null) {
    elJug.style.display = 'none';
    elMin.style.display = 'none';
    return;
  }

  elJug.style.fontSize = cfg.sizejugador + 'px';
  elMin.style.fontSize = cfg.sizeMinuto  + 'px';
  elJug.style.top = rowY + 'px';
  elMin.style.top = rowY + 'px';

  if (side === 'L') {
    // Right-aligned locals: Min is to the left of xLocal, Jug further left
    elMin.style.right  = (2000 - cfg.xLocal) + 'px';
    elMin.style.left   = 'auto';
    elMin.style.textAlign = 'right';
    elJug.style.right  = (2000 - cfg.xLocal + cfg.sizeMinuto * valMin.length * 0.6 + cfg.gapMin) + 'px';
    elJug.style.left   = 'auto';
    elJug.style.textAlign = 'right';
  } else {
    // Left-aligned visitantes: Min is to the right of xVisitante, Jug further right
    elMin.style.left  = cfg.xVisitante + 'px';
    elMin.style.right = 'auto';
    elMin.style.textAlign = 'left';
    elJug.style.left  = (cfg.xVisitante + cfg.sizeMinuto * valMin.length * 0.6 + cfg.gapMin) + 'px';
    elJug.style.right = 'auto';
    elJug.style.textAlign = 'left';
  }

  elMin.textContent   = valMin  !== '' ? valMin + "'" : '';
  elJug.textContent   = valJug;
  elMin.style.display = valMin  !== '' ? 'block' : 'none';
  elJug.style.display = valJug  !== '' ? 'block' : 'none';
}

  x:      0,
  y:      0,
  width:  2000,
  height: 2500,
};

function applyIconLayers() {

    var el = document.getElementById(layer.id);
    if (!el) return;
    el.style.left   = ICON_CFG.x + 'px';
    el.style.top    = ICON_CFG.y + 'px';
    el.style.width  = ICON_CFG.width + 'px';
    el.style.height = ICON_CFG.height + 'px';

      el.style.display = 'block';
    } else {
      el.style.display = 'none';
    }
  });
}
