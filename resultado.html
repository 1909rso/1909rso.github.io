<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Editor — 1909 RSO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d1b2a;
    --navy2: #111f30;
    --gold: #c9a84c;
    --gold2: #e8c86a;
    --surface: #182436;
    --border: #243448;
    --text: #e8eaf0;
    --muted: #7a8fa8;
    --green: #4caf76;
    --red: #e05555;
  }

  body {
    background: #080f18;
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }

  .logo {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .12em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .match-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 6px 16px;
  }
  .match-team {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .03em;
  }
  .match-vs {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .match-loading {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }

  .spacer { flex: 1; }

  .data-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.err { background: var(--red); }
  .dot.pulse {
    background: #5ab0ff;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── TOOLBAR ── */
  .toolbar {
    width: 100%;
    background: var(--navy);
    border-bottom: 1px solid var(--border);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .03em;
  }
  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-export {
    background: var(--gold);
    color: var(--navy);
  }
  .btn-export:hover { background: var(--gold2); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: auto;
    padding: 36px 20px 80px;
  }

  .canvas-wrap {
    transform-origin: top center;
    position: relative;
  }

  /* THE CARD */
  #card {
    width: 2000px;
    height: 2500px;
    position: relative;
    overflow: hidden;
    background: #00b140;
    transform-origin: top left;
  }

  #card-bg {
    position: absolute;
    top: 0; left: 0;
    width: 2000px;
    height: 2500px;
    object-fit: fill;
    display: none;
    z-index: 0;
  }

  .card-layer {
    position: absolute;
    line-height: 1;
  }

  /* ── ZOOM BAR ── */
  .zoom-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 7px 18px;
    font-size: 12px;
    z-index: 200;
    box-shadow: 0 4px 20px #0007;
  }
  .zoom-bar button {
    background: none; border: none;
    color: var(--text); font-size: 17px;
    cursor: pointer; line-height: 1; padding: 0 4px;
    transition: color .15s;
  }
  .zoom-bar button:hover { color: var(--gold); }
  .zoom-val {
    min-width: 44px; text-align: center;
    font-weight: 700; color: var(--gold);
    font-size: 13px;
  }
  .zoom-fit {
    font-size: 11px; color: var(--muted);
    cursor: pointer; padding: 2px 8px;
    border-left: 1px solid var(--border);
  }
  .zoom-fit:hover { color: var(--gold); }

  /* last-updated */
  .updated {
    font-size: 10px;
    color: var(--muted);
    opacity: .7;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">🏟 1909 RSO</div>

  <div class="match-badge">
    <span id="matchHome" class="match-loading">Cargando…</span>
    <span class="match-vs">vs</span>
    <span id="matchAway" class="match-loading"></span>
  </div>

  <div class="spacer"></div>

  <div class="data-pill">
    <div class="dot pulse" id="statusDot"></div>
    <span id="statusText">Conectando…</span>
    <span class="updated" id="updatedAt"></span>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="btn btn-outline" onclick="document.getElementById('bgInput').click()">
    🖼 Cargar fondo
  </button>
  <input type="file" id="bgInput" accept="image/*" style="display:none" onchange="loadBackground(this)">
  <div style="flex:1"></div>

  <button class="btn btn-export" id="exportBtn" onclick="exportCard()">
    ⬇ Descargar imagen
  </button>
</div>

<!-- CANVAS -->
<div class="canvas-area">
  <div class="canvas-wrap" id="canvasWrap">
    <div id="card">

      <!-- z-index 0: fondo subido por el usuario -->
      <img id="card-bg" alt="">

      <!-- z-index 1: Luzysombra — capa estática de luz y sombra -->
      <img id="layer-luzysombra" class="card-layer"
           src="https://raw.githubusercontent.com/1909rso/1909rso.github.io/main/resultaue/est/Luzysombra.PNG"
           alt="" crossorigin="anonymous"
           style="top:0; left:0; width:2000px; height:2500px; z-index:1; object-fit:fill;">

      <!-- z-index 2: EST — imagen dinámica según variable EST (0-8) -->
      <img id="layer-est" class="card-layer" src="" alt="" crossorigin="anonymous"
           style="display:none; z-index:2;">

      <!-- z-index 3: lauki — capa estática superior -->
      <img id="layer-lauki" class="card-layer"
           src="https://raw.githubusercontent.com/1909rso/1909rso.github.io/main/resultaue/est/lauki.PNG"
           alt="" crossorigin="anonymous"
           style="top:0; left:0; width:2000px; height:2500px; z-index:3; object-fit:fill;">

      <!-- z-index 4: capas de texto -->
      <!-- CAPA: Res_local -->
      <div id="d-Res_local" class="card-layer" style="z-index:4;"></div>

    </div>
  </div>
</div>

<!-- ZOOM -->
<div class="zoom-bar">
  <button onclick="zoom(-0.05)">−</button>
  <span class="zoom-val" id="zoomVal">15%</span>
  <button onclick="zoom(+0.05)">＋</button>
  <span class="zoom-fit" onclick="zoomFit()">Ajustar</span>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const DATA_URL = "https://script.google.com/macros/s/AKfycbyK9bf932Rbj1WgNuWVi8Sc1Y4kFW4JXNoZoQv2t3R0U4YQ-UEx6xfwAEghSTm-81kw/exec";

const KEY_HOME = 'Local';
const KEY_AWAY = 'Visitante';

const REFRESH_INTERVAL = 60000; // 1 minuto

// BASE URL para imágenes del repo
const GITHUB_BASE = 'https://raw.githubusercontent.com/1909rso/1909rso.github.io/refs/heads/main/resultaue/est/';

// ═══════════════════════════════════════════════════
// CAPAS — CONFIGURACIÓN
// ═══════════════════════════════════════════════════

// Capa: resultado equipo local
const LAYER_RES_LOCAL = {
  x:          100,
  y:          200,
  fontFamily: 'Arial',
  fontSize:   160,
  fontWeight: '900',
  color:      '#ffffff',
  align:      'left',
  width:      600,
};

// Capa: EST — imagen dinámica (0.png … 8.png)
const LAYER_EST = {
  x:      0,
  y:      0,
  width:  2000,
  height: 2500,
};

// ═══════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════
let scale = 0.15;

function applyScale() {
  const wrap = document.getElementById('canvasWrap');
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width  = Math.round(2000 * scale) + 'px';
  wrap.style.height = Math.round(2500 * scale) + 'px';
  document.getElementById('zoomVal').textContent = Math.round(scale * 100) + '%';
}

function zoom(delta) {
  scale = Math.max(0.05, Math.min(1.5, scale + delta));
  applyScale();
}

function zoomFit() {
  const area = document.querySelector('.canvas-area');
  const available = Math.min(area.clientWidth - 40, (window.innerHeight - 160) * (2000/2500));
  scale = parseFloat((available / 2000).toFixed(2));
  applyScale();
}

applyScale();

// ═══════════════════════════════════════════════════
// BACKGROUND
// ═══════════════════════════════════════════════════
function loadBackground(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const bg = document.getElementById('card-bg');
    bg.src = e.target.result;
    bg.style.display = 'block';
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
let sheetData = {};

function setStatus(state, msg) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className  = 'dot ' + state;
  text.textContent = msg;
}

function fetchData() {
  setStatus('pulse', 'Actualizando…');
  fetch(DATA_URL)
    .then(function(r) { return r.text(); })
    .then(function(text) {
      const data = JSON.parse(text);
      const obj = data[0];
      sheetData = obj;
      applyDataToLayers();
      updateMatchHeader();
      setStatus('ok', 'Datos al día');
      const now = new Date();
      document.getElementById('updatedAt').textContent =
        '- ' + now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
    })
    .catch(function(err) {
      setStatus('err', 'Error al cargar');
      console.error('fetchData error:', err);
    });
}

function applyDataToLayers() {
  applyLayerStyles();

  // Rellena elementos de texto genéricos: id="d-CLAVE"
  Object.keys(sheetData).forEach(function(key) {
    const safeKey = key.replace(/[\.\[\]]/g, '_');
    const el = document.getElementById('d-' + key) ||
               document.getElementById('d-' + safeKey);
    if (el) {
      const prefix = el.dataset.prefix || '';
      const suffix = el.dataset.suffix || '';
      el.textContent = prefix + String(sheetData[key] ?? '') + suffix;
    }
  });
}

function applyLayerStyles() {
  var cfg, el;

  // — Res_local —
  cfg = LAYER_RES_LOCAL;
  el  = document.getElementById('d-Res_local');
  if (el) {
    el.style.left       = cfg.x + 'px';
    el.style.top        = cfg.y + 'px';
    el.style.fontFamily = cfg.fontFamily;
    el.style.fontSize   = cfg.fontSize + 'px';
    el.style.fontWeight = cfg.fontWeight;
    el.style.color      = cfg.color;
    el.style.textAlign  = cfg.align;
    el.style.width      = cfg.width + 'px';
    el.style.lineHeight = '1';
  }

  // — EST: imagen dinámica según valor numérico 0-8 —
  cfg = LAYER_EST;
  el  = document.getElementById('layer-est');
  if (el) {
    el.style.left   = cfg.x + 'px';
    el.style.top    = cfg.y + 'px';
    el.style.width  = cfg.width + 'px';
    el.style.height = cfg.height + 'px';

    var estVal = sheetData["EST"];
    var dbg = document.getElementById("debug-est");
    if (estVal !== undefined && estVal !== null && estVal !== '') {
      var estNum = parseInt(estVal, 10);
      var url = GITHUB_BASE + estNum + ".PNG";
      el.src           = url;
      el.onerror = function() { if(dbg){dbg.textContent="EST "+estNum+" → ERROR 404: "+url; dbg.style.color="#e05555";} console.error("EST img error:",url); };
      el.onload  = function() { if(dbg){dbg.style.color="#4caf76";} };
      el.style.display = "block";
      if(dbg){ dbg.textContent="EST "+estNum+" → "+url; dbg.style.color="#7a8fa8"; }
    } else {
      el.style.display = "none";
      if(dbg){ dbg.textContent="EST: sin valor"; }
    }
  }
}

function updateMatchHeader() {
  const homeEl = document.getElementById('matchHome');
  const awayEl = document.getElementById('matchAway');

  const home = findField(KEY_HOME) || '—';
  const away = findField(KEY_AWAY) || '—';

  homeEl.textContent = home;
  awayEl.textContent = away;
  homeEl.className = 'match-team';
  awayEl.className = 'match-team';
}

function findField(key) {
  if (sheetData[key] !== undefined) return sheetData[key];
  const lower = key.toLowerCase();
  const found = Object.keys(sheetData).find(function(k) {
    return k.toLowerCase() === lower ||
           k.toLowerCase().replace(/[^a-z]/g,'') === lower.replace(/[^a-z]/g,'');
  });
  return found ? sheetData[found] : null;
}

// ═══════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════
async function exportCard() {
  const btn = document.getElementById('exportBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Generando…';

  const wrap = document.getElementById('canvasWrap');
  const card = document.getElementById('card');

  wrap.style.transform = 'scale(1)';
  wrap.style.width  = '2000px';
  wrap.style.height = '2500px';

  await new Promise(function(r) { setTimeout(r, 100); });

  try {
    const canvas = await html2canvas(card, {
      width: 2000,
      height: 2500,
      scale: 1,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      logging: false,
      imageTimeout: 15000
    });

    const link = document.createElement('a');
    link.download = '1909rso_' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Error al exportar: ' + e.message);
    console.error(e);
  }

  applyScale();

  btn.disabled = false;
  btn.textContent = '⬇ Descargar imagen';
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
fetchData();
setInterval(fetchData, REFRESH_INTERVAL);
</script>
</body>
</html>
